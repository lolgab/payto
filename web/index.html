<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d3b66">
  <title>PayTo — Pagamenti</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/client.svg">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/pwa-install.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="6" width="18" height="12" rx="2"/>
            <path d="M3 10h18"/>
          </svg>
        </div>
        <span class="brand-name">PayTo Pagamenti</span>
      </div>
      <span class="top-badge">Conto corrente</span>
    </header>

    <section class="account-card">
      <p class="account-label">Saldo disponibile</p>
      <p class="balance" id="balance">—</p>
      <div class="iban-row">
        <span class="iban-label">IBAN</span>
        <strong id="my-iban" class="iban-value">—</strong>
        <button type="button" id="btn-edit-iban" class="btn-link">Cambia IBAN</button>
        <p id="iban-status" class="inline-status" aria-live="polite"></p>
      </div>
    </section>

    <main id="home" class="screen">
      <div class="info-card">
        <p class="hint">Installa l'app, poi avvicina il telefono alla cassa del negozio. Si aprirà PayTo con l'importo da pagare.</p>
      </div>
      <p id="home-status" class="status"></p>
    </main>

    <main id="payment" class="screen payment-screen" hidden>
      <div class="pay-sheet">
        <p class="pay-prompt">Vuoi effettuare questo pagamento?</p>

        <div class="pay-flow">
          <div class="pay-party pay-party-from">
            <span class="pay-party-label">Da</span>
            <span class="pay-party-name">Il tuo conto</span>
            <span class="pay-party-iban" id="pay-from-iban">—</span>
          </div>
          <div class="pay-flow-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
          </div>
          <div class="pay-party pay-party-to">
            <span class="pay-party-label">A</span>
            <span class="pay-party-name" id="f-receiver">—</span>
            <span class="pay-party-iban" id="f-iban">—</span>
          </div>
        </div>

        <div class="pay-amount-block">
          <span class="pay-amount-label">Importo</span>
          <p class="pay-amount" id="f-amount" aria-live="polite">—</p>
        </div>

        <div class="pay-meta">
          <div class="pay-meta-row" id="row-bic" hidden>
            <span class="pay-meta-label">BIC</span>
            <span class="pay-meta-value" id="f-bic">—</span>
          </div>
          <div class="pay-meta-row" id="row-message" hidden>
            <span class="pay-meta-label">Causale</span>
            <span class="pay-meta-value" id="f-message">—</span>
          </div>
        </div>

        <ul id="errors" class="errors"></ul>

        <div class="pay-actions">
          <button type="button" id="btn-pay" class="btn btn-pay-confirm">
            <span class="btn-pay-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
              </svg>
            </span>
            Conferma pagamento
          </button>
          <button type="button" id="btn-cancel" class="btn btn-pay-cancel">Annulla</button>
        </div>
      </div>
    </main>

    <main id="success" class="screen" hidden>
      <div class="detail-card success-card">
        <div class="success-icon" aria-hidden="true">✓</div>
        <h2>Pagamento inviato</h2>
        <p id="success-text"></p>
        <button type="button" id="btn-done" class="btn btn-primary">Fine</button>
      </div>
    </main>
  </div>
  <script src="/pwa-install.js"></script>
  <script src="/app.js?v=3"></script>
</body>
</html>
