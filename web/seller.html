<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d3b66">
  <title>PayTo — Cassa</title>
  <link rel="manifest" href="/seller.webmanifest">
  <link rel="icon" href="/icons/seller.svg">
  <link rel="stylesheet" href="/seller.css">
  <link rel="stylesheet" href="/pwa-install.css">
  <script src="/qr-creator.min.js"></script>
</head>
<body>
  <div class="pos">
    <header class="pos-header">
      <div class="pos-brand">
        <div class="pos-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M6 8h.01M10 8h.01"/>
          </svg>
        </div>
        <span>PayTo Cassa</span>
      </div>
      <span id="shop-name" class="pos-shop">—</span>
    </header>
    <div class="seller-account">
      <span class="seller-account-label">IBAN incasso</span>
      <strong id="seller-iban" class="seller-account-value">—</strong>
      <button type="button" id="btn-edit-seller-iban" class="seller-account-link">Cambia IBAN</button>
      <p id="seller-iban-status" class="seller-account-status" aria-live="polite"></p>
    </div>

    <div class="pos-body">
      <section id="screen-input" class="pos-screen">
        <p class="pos-label">Importo da incassare</p>
        <div class="pos-display">
          <span id="amount-display" class="pos-amount">€ 0,00</span>
        </div>
        <div class="pos-keypad">
          <button class="key" data-key="7">7</button>
          <button class="key" data-key="8">8</button>
          <button class="key" data-key="9">9</button>
          <button class="key" data-key="4">4</button>
          <button class="key" data-key="5">5</button>
          <button class="key" data-key="6">6</button>
          <button class="key" data-key="1">1</button>
          <button class="key" data-key="2">2</button>
          <button class="key" data-key="3">3</button>
          <button class="key key-fn" data-key="clear">C</button>
          <button class="key" data-key="0">0</button>
          <button class="key key-fn" data-key="back">⌫</button>
        </div>
        <button id="btn-enter" class="pos-enter" disabled>Continua</button>
      </section>

      <section id="screen-nfc" class="pos-screen" hidden>
        <div class="nfc-panel">
          <p id="nfc-amount" class="nfc-amount">€ 0,00</p>
          <div class="nfc-qr-wrap">
            <canvas id="payment-qr" class="nfc-qr" aria-label="Codice QR per pagamento"></canvas>
          </div>
          <p class="nfc-qr-hint">Scansiona con la fotocamera o apri PayTo</p>
          <div class="nfc-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="48" height="48">
              <circle cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
              <circle cx="32" cy="32" r="20" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
              <circle cx="32" cy="32" r="12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.7"/>
              <circle cx="32" cy="32" r="4" fill="currentColor"/>
            </svg>
          </div>
          <p id="nfc-status" class="nfc-status">Avvicina il telefono del cliente — PayTo apparirà tra le app disponibili</p>
          <button id="btn-cancel" class="pos-cancel">Annulla pagamento</button>
        </div>
      </section>

      <section id="screen-done" class="pos-screen done-screen" hidden>
        <div class="done-panel">
          <p class="done-check">✓</p>
          <p class="done-title">Pagamento ricevuto</p>
          <p id="done-amount" class="done-amount">€ 0,00</p>
          <div class="done-payer">
            <p id="done-from-name" class="done-from-name">—</p>
            <p id="done-from-iban" class="done-from-iban">—</p>
          </div>
          <p class="done-hint">Tocca lo schermo per una nuova vendita</p>
        </div>
      </section>
    </div>
  </div>
  <script src="/pwa-install.js"></script>
  <script src="/seller.js"></script>
</body>
</html>
