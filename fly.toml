app = 'payto'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'payto_data'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = 512
  cpu_kind = 'shared'
  cpus = 1
