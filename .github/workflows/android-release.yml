name: Android Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-apk:
    name: Build and publish APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        id: keystore-cache
        with:
          path: android/release.keystore
          key: payto-android-release-keystore-v1

      - name: Prepare signing keystore
        working-directory: android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
          elif [ ! -f release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias payto \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass payto-ci \
              -keypass payto-ci \
              -dname "CN=PayTo POC, OU=PayTo, O=PayTo, L=Rome, ST=Italy, C=IT"
          fi

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          export ANDROID_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-payto-ci}"
          export ANDROID_KEY_ALIAS="${ANDROID_KEY_ALIAS:-payto}"
          export ANDROID_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-payto-ci}"
          ./gradlew assembleRelease --no-daemon \
            -PversionCode=${{ github.run_number }} \
            -PversionName=0.1.${{ github.run_number }}

      - name: Signing certificate SHA-256
        id: cert
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          STORE_PASS="${ANDROID_KEYSTORE_PASSWORD:-payto-ci}"
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-payto}"
          SHA256=$(keytool -list -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -storepass "$STORE_PASS" | grep "SHA256:" | head -1 | sed 's/.*SHA256: //')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Certificate SHA-256: $SHA256"

      - name: Sync assetlinks.json
        run: |
          SHA256="${{ steps.cert.outputs.sha256 }}"
          FILE="web/.well-known/assetlinks.json"
          python3 - <<PY
          import json, pathlib, sys
          sha = "$SHA256"
          path = pathlib.Path("$FILE")
          data = json.loads(path.read_text())
          changed = False
          for entry in data:
              fps = entry["target"]["sha256_cert_fingerprints"]
              if fps != [sha]:
                  entry["target"]["sha256_cert_fingerprints"] = [sha]
                  changed = True
          if changed:
              path.write_text(json.dumps(data, indent=2) + "\n")
              print(f"Updated {path}")
          else:
              print("assetlinks.json already up to date")
          PY
          if git diff --quiet "$FILE"; then
            echo "synced=false" >> "$GITHUB_OUTPUT"
          else
            echo "synced=true" >> "$GITHUB_OUTPUT"
          fi
        id: assetlinks

      - name: Commit assetlinks.json
        if: steps.assetlinks.outputs.synced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/.well-known/assetlinks.json
          git commit -m "Update assetlinks.json with release signing certificate"
          git push

      - name: Package APKs
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk payto-wallet.apk
          cp android/seller-app/build/outputs/apk/release/seller-app-release.apk payto-cassa.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: PayTo APK v${{ github.run_number }}
          body: |
            Build automatico da commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            | | |
            |---|---|
            | **Version** | 0.1.${{ github.run_number }} (${{ github.run_number }}) |
            | **Commit** | ${{ github.event.head_commit.message }} |

            ### Installazione

            | APK | Destinatario |
            |-----|----------------|
            | `payto-wallet.apk` | Cliente — pagamenti e wallet |
            | `payto-cassa.apk` | Esercente — cassa POS |

            Installa l'APK adatto sul telefono (sideload). I due pacchetti (`it.payto.wallet` e `it.payto.seller`) possono coesistere sullo stesso dispositivo.

            ### TWA / Asset Links

            Impronta SHA-256 del certificato di firma (da inserire in `web/.well-known/assetlinks.json` per entrambe le app):

            ```
            ${{ steps.cert.outputs.sha256 }}
            ```
          files: |
            payto-wallet.apk
            payto-cassa.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
